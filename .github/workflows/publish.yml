name: Publish

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # Required for OIDC authentication
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Dependencies
              run: pnpm install

            - name: Install Playwright Browsers
              run: pnpm exec playwright install --with-deps

            - name: Test
              run: pnpm run test:all
              env:
                  ECOPAGES_BASE_URL: http://localhost:3000
                  ECOPAGES_LOGGER_DEBUG: false

            - name: Validate synced versions
              run: pnpm run release:check:versions

            - name: Publish package @ecopages/file-system
              run: pnpm --filter @ecopages/file-system release:jsr

            - name: Publish package @ecopages/core
              run: pnpm --filter @ecopages/core release:jsr

            - name: Publish package @ecopages/postcss-processor
              run: pnpm --filter @ecopages/postcss-processor release:jsr

            - name: Publish package @ecopages/image-processor
              run: pnpm --filter @ecopages/image-processor release:jsr

            - name: Publish package @ecopages/kitajs
              run: pnpm --filter @ecopages/kitajs release:jsr

            - name: Publish package @ecopages/lit
              run: pnpm --filter @ecopages/lit release:jsr

            - name: Publish package @ecopages/mdx
              run: pnpm --filter @ecopages/mdx release:jsr

            - name: Publish package @ecopages/react
              run: pnpm --filter @ecopages/react release:jsr

            - name: Publish package @ecopages/browser-router
              run: pnpm --filter @ecopages/browser-router release:jsr

            - name: Publish package @ecopages/react-router
              run: pnpm --filter @ecopages/react-router release:jsr

            - name: Build npm packages
              run: pnpm run build:npm

            - name: Setup Node.js for NPM Publish
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Publish npm package @ecopages/file-system
              run: pnpm run release:npm -- packages/file-system/dist

            - name: Publish npm package @ecopages/core
              run: pnpm run release:npm -- packages/core/dist

            - name: Publish npm package @ecopages/postcss-processor
              run: pnpm run release:npm -- packages/processors/postcss-processor/dist

            - name: Publish npm package @ecopages/image-processor
              run: pnpm run release:npm -- packages/processors/image-processor/dist

            - name: Publish npm package @ecopages/kitajs
              run: pnpm run release:npm -- packages/integrations/kitajs/dist

            - name: Publish npm package @ecopages/lit
              run: pnpm run release:npm -- packages/integrations/lit/dist

            - name: Publish npm package @ecopages/mdx
              run: pnpm run release:npm -- packages/integrations/mdx/dist

            - name: Publish npm package @ecopages/react
              run: pnpm run release:npm -- packages/integrations/react/dist

            - name: Publish npm package @ecopages/browser-router
              run: pnpm run release:npm -- packages/browser-router/dist

            - name: Publish npm package @ecopages/react-router
              run: pnpm run release:npm -- packages/react-router/dist

            - name: Publish npm package ecopages
              run: pnpm run release:npm -- npm/ecopages
