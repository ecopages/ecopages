name: Publish

on:
    push:
        branches:
            - main

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # The OIDC ID token is used for authentication with JSR.
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Dependencies
              run: pnpm install

            - name: Test
              run: pnpm run test:all
              env:
                  ECOPAGES_BASE_URL: http://localhost:3000
                  ECOPAGES_LOGGER_DEBUG: false

            - name: Publish package @ecopages/bun-inline-css-plugin
              run: pnpm --filter @ecopages/bun-inline-css-plugin release:jsr

            - name: Publish package @ecopages/file-system
              run: pnpm --filter @ecopages/file-system release:jsr

            - name: Publish package @ecopages/core
              run: pnpm --filter @ecopages/core release:jsr

            - name: Publish package @ecopages/postcss-processor
              run: pnpm --filter @ecopages/postcss-processor release:jsr

            - name: Publish package @ecopages/image-processor
              run: pnpm --filter @ecopages/image-processor release:jsr

            - name: Publish package @ecopages/kitajs
              run: pnpm --filter @ecopages/kitajs release:jsr

            - name: Publish package @ecopages/lit
              run: pnpm --filter @ecopages/lit release:jsr

            - name: Publish package @ecopages/mdx
              run: pnpm --filter @ecopages/mdx release:jsr

            - name: Publish package @ecopages/react
              run: pnpm --filter @ecopages/react release:jsr

            - name: Publish package @ecopages/browser-router
              run: pnpm --filter @ecopages/browser-router release:jsr

            - name: Publish package @ecopages/react-router
              run: pnpm --filter @ecopages/react-router release:jsr

            - name: Sync versions
              run: pnpm run jsr:sync-version

            - name: Setup Node.js for NPM Publish
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Check if version already published
              id: check-version
              run: |
                  LOCAL_VERSION=$(node -p "require('./npm/ecopages/package.json').version")
                  if npm view "ecopages@$LOCAL_VERSION" version &>/dev/null; then
                    echo "Version $LOCAL_VERSION is already published"
                    echo "published=true" >> $GITHUB_OUTPUT
                  else
                    echo "Version $LOCAL_VERSION is not published yet"
                    echo "published=false" >> $GITHUB_OUTPUT
                  fi

            - name: Publish ecopages to NPM
              if: steps.check-version.outputs.published == 'false'
              run: cd npm/ecopages && npm publish --access public --provenance
