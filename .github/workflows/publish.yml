name: Publish

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # The OIDC ID token is used for authentication with JSR.
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Dependencies
              run: pnpm install

            - name: Test
              run: pnpm run test:all
              env:
                  ECOPAGES_BASE_URL: http://localhost:3000
                  ECOPAGES_LOGGER_DEBUG: false

            - name: Publish package @ecopages/bun-inline-css-plugin
              run: pnpm --filter @ecopages/bun-inline-css-plugin release:jsr

            - name: Publish package @ecopages/file-system
              run: pnpm --filter @ecopages/file-system release:jsr

            - name: Publish package @ecopages/core
              run: pnpm --filter @ecopages/core release:jsr

            - name: Publish package @ecopages/postcss-processor
              run: pnpm --filter @ecopages/postcss-processor release:jsr

            - name: Publish package @ecopages/image-processor
              run: pnpm --filter @ecopages/image-processor release:jsr

            - name: Publish package @ecopages/kitajs
              run: pnpm --filter @ecopages/kitajs release:jsr

            - name: Publish package @ecopages/lit
              run: pnpm --filter @ecopages/lit release:jsr

            - name: Publish package @ecopages/mdx
              run: pnpm --filter @ecopages/mdx release:jsr

            - name: Publish package @ecopages/react
              run: pnpm --filter @ecopages/react release:jsr

            - name: Publish package @ecopages/browser-router
              run: pnpm --filter @ecopages/browser-router release:jsr

            - name: Publish package @ecopages/react-router
              run: pnpm --filter @ecopages/react-router release:jsr

            - name: Sync versions
              run: pnpm run jsr:sync-version

            - name: Build npm packages
              run: pnpm run build:npm

            - name: Setup Node.js for NPM Publish
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Publish npm packages
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  publish_package() {
                    local package_dir="$1"
                    local package_name
                    local package_version
                    local dist_tag

                    package_name=$(node -p "require('./${package_dir}/package.json').name")
                    package_version=$(node -p "require('./${package_dir}/package.json').version")
                    dist_tag=$(node -p "(() => { const version = require('./${package_dir}/package.json').version; const match = version.match(/-([0-9A-Za-z-]+)\./); return match ? match[1] : 'latest'; })()")

                    if npm view "${package_name}@${package_version}" version &>/dev/null; then
                      echo "${package_name}@${package_version} already published"
                      return 0
                    fi

                    echo "Publishing ${package_name}@${package_version} with tag ${dist_tag}"
                    (cd "${package_dir}" && npm publish --access public --provenance --tag "${dist_tag}")
                  }

                  publish_package packages/file-system/dist
                  publish_package packages/core/dist
                  publish_package packages/processors/postcss-processor/dist
                  publish_package packages/processors/image-processor/dist
                  publish_package packages/plugins/bun-inline-css-plugin/dist
                  publish_package packages/integrations/kitajs/dist
                  publish_package packages/integrations/lit/dist
                  publish_package packages/integrations/mdx/dist
                  publish_package packages/integrations/react/dist
                  publish_package packages/browser-router/dist
                  publish_package packages/react-router/dist
                  publish_package npm/ecopages
